<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e3f"/>
      <stop offset="50%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#8d6e3f"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Hanger icon -->
  <g transform="translate(40, 30)" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round">
    <path d="M 50 0 C 30 0, 15 15, 15 35 L 15 40"/>
    <path d="M 15 40 L 85 40"/>
    <path d="M 85 40 L 85 35 C 85 15, 70 0, 50 0"/>
    <line x1="50" y1="35" x2="50" y2="90"/>
    <path d="M 38 90 C 38 100, 45 105, 50 105 C 55 105, 62 100, 62 90"/>
  </g>

  <!-- Dress icon -->
  <g transform="translate(38, 125)" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 25 0 L 15 25 L 25 20 L 20 50 L 30 40 L 30 65 L 40 65 L 40 40 L 50 50 L 45 20 L 55 25 L 45 0 Z"/>
  </g>

  <!-- Divider line -->
  <line x1="130" y1="40" x2="130" y2="180" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>

  <!-- Text -->
  <text x="145" y="85" font-family="'Times New Roman', Georgia, serif" font-size="56" font-weight="bold" fill="#c9a96e" letter-spacing="4">MARÍA</text>
  <text x="145" y="125" font-family="'Times New Roman', Georgia, serif" font-size="32" fill="#c9a96e" letter-spacing="8" font-style="italic">COLLECTION</text>

  <!-- Decorative line -->
  <line x1="145" y1="140" x2="460" y2="140" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>

  <!-- Tagline -->
  <text x="145" y="165" font-family="Georgia, serif" font-size="11" fill="#c9a96e" letter-spacing="4" opacity="0.8">ROPA · ACCESORIOS · TENDENCIA</text>
</svg>
